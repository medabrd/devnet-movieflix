services:
  db:
    image: postgres:16-alpine
    container_name: movieflix-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-movieflix}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-movieflix}
      POSTGRES_DB: ${POSTGRES_DB:-movieflix}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-movieflix}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - movieflix

  api:
    build:
      context: ./backend
    container_name: movieflix-api
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-movieflix}:${POSTGRES_PASSWORD:-movieflix}@db:5432/${POSTGRES_DB:-movieflix}
      TMDB_API_KEY: ${TMDB_API_KEY}
      JWT_SECRET: ${JWT_SECRET:-please-change-me-in-production}
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"
    networks:
      - movieflix
    restart: unless-stopped

  web:
    build:
      context: ./frontend
    container_name: movieflix-web
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-8080}:80"
    networks:
      - movieflix
    restart: unless-stopped

volumes:
  db_data:

networks:
  movieflix:
    driver: bridge
