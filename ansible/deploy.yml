---
- name: Deploy MovieFlix stack
  hosts: movieflix
  become: true

  vars:
    project_root: "{{ project_root | default('/opt/movieflix') }}"
    repo_src: "{{ playbook_dir }}/.."
    env_file_src: "{{ playbook_dir }}/../.env"

  tasks:
    - name: Ensure required packages are present
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - python3-pip
        state: present
        update_cache: true

    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present

    - name: Install Docker engine and compose plugin
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present
        update_cache: true

    - name: Make sure Docker is running
      service:
        name: docker
        state: started
        enabled: true

    - name: Create project directory
      file:
        path: "{{ project_root }}"
        state: directory
        mode: '0755'

    - name: Sync project sources
      synchronize:
        src: "{{ repo_src }}/"
        dest: "{{ project_root }}/"
        delete: false
        rsync_opts:
          - "--exclude=.git"
          - "--exclude=node_modules"
          - "--exclude=__pycache__"
          - "--exclude=.venv"
          - "--exclude=ansible"

    - name: Copy environment file
      copy:
        src: "{{ env_file_src }}"
        dest: "{{ project_root }}/.env"
        mode: '0600'

    - name: Build and start the stack
      command: docker compose up -d --build
      args:
        chdir: "{{ project_root }}"

    - name: Wait for API health endpoint
      uri:
        url: "http://localhost:{{ web_port | default(8080) }}/api/health"
        return_content: true
      register: health
      retries: 12
      delay: 5
      until: health.status == 200

    - name: Print health status
      debug:
        msg: "MovieFlix is healthy: {{ health.json }}"
